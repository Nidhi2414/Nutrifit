<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutri Fit | Product Detail</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body class="scrollable-body">

    <header class="dashboard-header">
        <div class="header-container">
            <div class="logo1">
                <img src="Group 1.png" alt="Nutri Fit" style="margin-left: 50px;">
            </div>
            <div class="search-icon"><img src="ic_round-search.png" height="20px" width="auto" style="margin-top: -19px;"></div>
        </div>
    </header>

    <main class="detail-container">
        <div class="product-main-card">
            <div class="product-description">
                <h2 class="item-title">The South Indian Platter</h2>
                <p class="description-text">
                    Soft, fluffy idlis paried with crispy golden vadas, 
                    served with flavourful sambar and creamy coconut chutney
                </p>
                <div class="price-line">
                    <span class="price">₹130</span> | <span class="offers">with UPI offers</span>
                </div>
            </div>
            <div class="product-image">
                <img src="Rectangle 161.png" alt="South Indian Platter">
            </div>
        </div>

        <div class="action-bar-card">
            <div class="rating-box">
                <div class="rating-badge">
                    4.9 <span class="star">★</span>
                </div>
                <span class="review-count">250+ Reviews</span>
            </div>
            
            <div class="button-group">
                <button class="btn-primary">Place Order</button>
                <button class="btn-secondary" onclick="window.location.href='nutricalc.html'">Nutri counts</button>
            </div>
        </div>
    </main>

</body>
</html>
