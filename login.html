<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Nutri Fit</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <header class="hh">
        <div class="logo">
            <img src="Group 1.png" height="75px" width="100px" alt="Nutri Fit Logo" style="justify-content: left;">
        </div>
    </header>    

    <div class="login-container">
        <div class="login-box">
            <h1 style="font-style: Konkhmer Sleokchher;">HELLO!</h1>
            <div class="input-container">
                <input type="email" id="email" placeholder="Email">
                <input type="password" id="password"  placeholder="Password">
            </div>
            <button type="button" class="login-btn" onclick="handleLogin()" style="font-style: Nunito;">Login</button>
            <p class="continue-text">Or continue</p>
            <button class="google-btn">
                <img src="image 42.png" height="50px" width="100px"> 
            </button>
        </div>

        <div class="dna-graphic">
            <img src="image 41.png" alt="Nutri DNA">
        </div>
    </div>
    <script src="script.js"></script>

</body>
</html>
