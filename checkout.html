<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutri Fit | Checkout</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="checkout-flow">

    <section id="step-review" class="checkout-step">
        <div class="header-bar">
            <button class="back-btn" onclick="window.location.href='cart.html'"><img src="gg_arrow-left-r.png" height="20px" width="20px" style="margin-top: 3%; margin-bottom: -3px;"></button> 
            Review your order
        </div>
        
        <div class="progress-track-container">
            <div class="progress-step active" id="p1">
                <div class="step-circle">1</div>
                <span class="step-text">Review</span>
            </div>
            <div class="step-connector" id="line1"></div>
            <div class="progress-step" id="p2">
                <div class="step-circle">2</div>
                <span class="step-text">Payment</span>
            </div>
        </div>

        <div class="promo-banner">₹30 OFF ON Your First Order</div>
        
        <div id="review-list" class="review-items-box">
            <div class="review-item-card">
                <div class="item-img-container">
                    <img src="Rectangle 200.png" alt="South Indian Platter">
                </div>
                <div class="item-info-details">
                    <h3 class="item-title">The south indian platter</h3>
                    <p class="item-pricing">
                        <span class="new-price">₹100</span> 
                        <span class="old-price">₹130</span>
                    </p>
                    <p class="vendor-tag">From : Nutri Fit</p>
                    <div class="star-rating">⭐⭐⭐⭐⭐</div>
                </div>
                <button class="continue-btn" onclick="goToStep(3)">Continue</button>
            </div>
        </div>
        
        <div class="delivery-card">
            <div class="delivery-details">
                <p class="delivery-time">🚚 Estimated delivery by today 04:30</p>
                <p class="user-addr">Kavya 8967359012<br>Galaxy Apartment, Bengaluru</p>
            </div>
            <button class="change-btn">Change</button>
        </div>
    </section>

    <section id="step-payment" class="checkout-step" style="display:none;">
        <div class="header-bar">
            <button class="back-btn" onclick="goToStep(2)"><img src="gg_arrow-left-r.png" height="20px" width="20px" style="margin-top: 3%; margin-bottom: -3px;"></button> 
            Payment Method
        </div>
        
        <div class="progress-track-container">
            <div class="progress-step completed">
                <div class="step-circle">✔</div>
                <span class="step-text">Review</span>
            </div>
            <div class="step-connector active"></div>
            <div class="progress-step active">
                <div class="step-circle">2</div>
                <span class="step-text">Payment</span>
            </div>
        </div>

        <div class="payment-options">
            <label class="pay-option-card">
                <input type="radio" name="payment" checked> 
                <span>Cash on Delivery 💵</span>
            </label>
            <label class="pay-option-card">
                <input type="radio" name="payment"> 
                <span>Pay Online (UPI / Cards) 📱</span>
            </label>
        </div>

        <button class="place-order-final" onclick="finalOrder()">Place Order</button>
    </section>

    <script src="script.js"></script>
</body>
</html>
